<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <!-- Metallic Gold Gradients -->
    <linearGradient id="gold-grad-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="30%" stop-color="#FFD54F" />
      <stop offset="70%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>
    
    <linearGradient id="gold-grad-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB300" />
      <stop offset="50%" stop-color="#FF8F00" />
      <stop offset="100%" stop-color="#FF6F00" />
    </linearGradient>

    <linearGradient id="gold-bevel-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="50%" stop-color="#FFF59D" />
      <stop offset="100%" stop-color="#FFD54F" />
    </linearGradient>

    <linearGradient id="gold-bevel-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F00" />
      <stop offset="50%" stop-color="#E65100" />
      <stop offset="100%" stop-color="#3E2723" />
    </linearGradient>

    <!-- Metallic Silver/Chrome Gradients -->
    <linearGradient id="silver-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#ECEFF1" />
      <stop offset="50%" stop-color="#CFD8DC" />
      <stop offset="85%" stop-color="#90A4AE" />
      <stop offset="100%" stop-color="#78909C" />
    </linearGradient>
    
    <linearGradient id="silver-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90A4AE" />
      <stop offset="50%" stop-color="#78909C" />
      <stop offset="100%" stop-color="#37474F" />
    </linearGradient>

    <linearGradient id="silver-bevel-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CFD8DC" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#ECEFF1" />
    </linearGradient>

    <linearGradient id="silver-bevel-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78909C" />
      <stop offset="50%" stop-color="#455A64" />
      <stop offset="100%" stop-color="#212121" />
    </linearGradient>

    <!-- Drop Shadows for 3D Depth -->
    <filter id="premium-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.65" />
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Main Container -->
  <g filter="url(#premium-shadow)">
    
    <!-- ================================================================= -->
    <!-- 1. MONOGRAM "IS"                                                  -->
    <!-- ================================================================= -->
    
    <!-- THE GOLDEN "I" PILLAR (Left side) -->
    <!-- Front Bevel Left Side -->
    <polygon points="360,250 405,295 405,535 360,490" fill="url(#gold-bevel-light)" />
    <!-- Front Bevel Right Side (Shaded) -->
    <polygon points="405,295 450,340 450,580 405,535" fill="url(#gold-bevel-dark)" />
    
    <!-- 3D Side Depth (Bottom Bevel edge to make it look pop out) -->
    <polygon points="360,490 405,535 405,545 360,500" fill="#E65100" opacity="0.8" />
    <polygon points="405,535 450,580 450,590 405,545" fill="#3E2723" opacity="0.8" />

    <!-- THE SILVER "S" (Right side, styled as interlocking geometric folds) -->
    <!-- We build the stylized silver "S" with premium multi-facet beveled polygons -->
    
    <!-- Top Horizontal Bar (Upper segment of S) -->
    <!-- Top face of the top horizontal bar -->
    <polygon points="450,250 630,250 630,295 495,295" fill="url(#silver-bevel-light)" />
    <!-- Bottom face of the top horizontal bar (shaded) -->
    <polygon points="495,295 630,295 630,340 450,340" fill="url(#silver-bevel-dark)" />
    
    <!-- Right Outer Curve/Connector (Going down from Top to Middle) -->
    <polygon points="585,340 630,340 630,425 585,425" fill="url(#silver-bevel-light)" />
    <polygon points="630,340 645,340 645,425 630,425" fill="url(#silver-bevel-dark)" />

    <!-- Middle Horizontal Bar (Middle segment of S) -->
    <!-- Top face of middle bar -->
    <polygon points="450,425 585,425 585,470 410,470" fill="url(#silver-bevel-light)" />
    <!-- Bottom face of middle bar -->
    <polygon points="410,470 585,470 585,515 450,515" fill="url(#silver-bevel-dark)" />
    
    <!-- Left Outer Curve/Connector (Going down from Middle to Bottom) -->
    <polygon points="410,470 450,470 450,555 410,555" fill="url(#silver-bevel-light)" />
    <polygon points="450,470 460,470 460,555 450,555" fill="url(#silver-bevel-dark)" />

    <!-- Bottom Horizontal Bar (Bottom segment of S, wrapping back right and joining bottom of I) -->
    <!-- Top face of bottom bar -->
    <polygon points="410,535 630,535 630,580 450,580" fill="url(#silver-bevel-light)" />
    <!-- Bottom face of bottom bar -->
    <polygon points="450,580 630,580 630,625 410,625" fill="url(#silver-bevel-dark)" />

    <!-- ================================================================= -->
    <!-- 2. "INOVA" TEXT                                                   -->
    <!-- ================================================================= -->
    
    <!-- Letters: I, N, O, A in Premium Silver Metallic -->
    <!-- Letter: V in Premium Gold Metallic -->
    <g transform="translate(0, 720)">
      <!-- Text INOVA with stylized spacing using paths or text with premium font-family -->
      <!-- We use precise text element with fallbacks and styling -->
      <text x="500" y="0" 
            font-family="Montserrat, 'Space Grotesk', 'Inter', sans-serif" 
            font-size="94" 
            font-weight="bold" 
            letter-spacing="18" 
            text-anchor="middle" 
            fill="none">
        <!-- SVG Text Gradient Fill with custom letter fills -->
        <tspan fill="url(#silver-grad-light)">I</tspan>
        <tspan fill="url(#silver-grad-light)">N</tspan>
        <tspan fill="url(#silver-grad-light)">O</tspan>
        <tspan fill="url(#gold-grad-left)">V</tspan>
        <tspan fill="url(#silver-grad-light)">A</tspan>
      </text>
    </g>

    <!-- ================================================================= -->
    <!-- 3. "— STUDIO —" TEXT                                              -->
    <!-- ================================================================= -->
    
    <g transform="translate(0, 810)">
      <!-- Left decorative horizontal line -->
      <line x1="220" y1="-10" x2="340" y2="-10" stroke="url(#gold-grad-left)" stroke-width="3.5" />
      
      <!-- STUDIO Text -->
      <text x="500" y="0" 
            font-family="Montserrat, 'Space Grotesk', 'Inter', sans-serif" 
            font-size="34" 
            font-weight="500" 
            letter-spacing="24" 
            text-anchor="middle" 
            fill="url(#gold-grad-left)">STUDIO</text>
            
      <!-- Right decorative horizontal line -->
      <line x1="660" y1="-10" x2="780" y2="-10" stroke="url(#gold-grad-left)" stroke-width="3.5" />
    </g>

  </g>
</svg>
